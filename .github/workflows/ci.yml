name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python — lint + type + test + constitutional
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright

      - name: Pytest
        run: uv run pytest

      - name: Forbidden imports (constitutional)
        run: |
          ! grep -RE "^\s*(import|from)\s+(ccxt|openai|anthropic|langchain|web3|binance|btcturk|pybit|okx|gate_api|kucoin|huobi|bitfinex|kraken)" \
              sentinel/ tests/ 2>/dev/null || (echo "FORBIDDEN IMPORT detected" && exit 1)

      - name: Forbidden outputs (constitutional)
        run: |
          ! grep -RE "\"(BUY|SELL|EXECUTE_REAL|ORDER_SUBMIT)\"" sentinel/ 2>/dev/null \
              || (echo "FORBIDDEN OUTPUT string literal detected" && exit 1)

  panel:
    name: Panel — typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: panel/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: panel
        run: pnpm install --frozen-lockfile

      - name: API typecheck
        working-directory: panel/api
        run: pnpm lint

      - name: API test
        working-directory: panel/api
        run: pnpm test

      - name: Web typecheck
        working-directory: panel/web
        run: pnpm lint

      - name: Web build
        working-directory: panel/web
        run: pnpm build
